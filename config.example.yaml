# Relify 配置文件示例

# 数据目录配置
data_dir: "./data"  # 数据目录路径，用于存放数据库和日志文件

# 日志级别配置
log_level: "info"  # debug, info, warn, error

# 驱动配置
drivers:
  telegram:
    type: "telegram"
    enabled: true
    config:
      bot_token: "YOUR_BOT_TOKEN"
      api_id: 12345
      api_hash: "YOUR_API_HASH"

  discord:
    type: "discord"
    enabled: true
    config:
      bot_token: "YOUR_BOT_TOKEN"
      webhook_url: "https://discord.com/api/webhooks/..."

  matrix:
    type: "matrix"
    enabled: false
    config:
      homeserver: "https://matrix.org"
      access_token: "YOUR_ACCESS_TOKEN"

# Relify 配置文件示例

# 数据目录配置
data_dir: "./data"  # 数据目录路径，用于存放数据库和日志文件

# 日志级别配置
log_level: "info"  # debug, info, warn, error

# 架构模式配置
# - peer: 对等架构，所有平台逻辑对等
# - hub: 中心平台架构，所有消息在中心平台处理
mode: "hub"

# 中心平台配置（仅在 mode 为 hub 时需要，必须显式指定）
hub_platform: "matrix"

# 平台配置
platforms:
  telegram:
    type: "telegram"
    enabled: true
    config:
      bot_token: "YOUR_BOT_TOKEN"
      api_id: 12345
      api_hash: "YOUR_API_HASH"

  discord:
    type: "discord"
    enabled: true
    config:
      bot_token: "YOUR_BOT_TOKEN"
      webhook_url: "https://discord.com/api/webhooks/..."

  matrix:
    type: "matrix"
    enabled: true
    config:
      homeserver: "https://matrix.org"
      access_token: "YOUR_ACCESS_TOKEN"
